name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-build-scan:
    name: Test, build, and scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsforge
          POSTGRES_PASSWORD: opsforge
          POSTGRES_DB: opsforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsforge -d opsforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      IMAGE_NAME: opsforge-api
      IMAGE_TAG: ${{ github.sha }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run SQLite unit tests
        run: pytest tests/test_app.py

      - name: Run PostgreSQL integration test
        env:
          DATABASE_URL: postgresql+psycopg://opsforge:opsforge@127.0.0.1:5432/opsforge
        run: pytest tests/postgres_integration.py

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: opsforge-api:${{ github.sha }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          scanners: vuln
          severity: HIGH,CRITICAL
