apiVersion: v1
kind: Secret
metadata:
  name: opsforge-postgres-secret
  namespace: opsforge
type: Opaque
stringData:
  POSTGRES_USER: replace-with-local-user
  POSTGRES_PASSWORD: replace-with-local-password
  DATABASE_URL: postgresql+psycopg://replace-with-local-user:replace-with-local-password@postgres:5432/opsforge
