apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsforge-api
  namespace: opsforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsforge-api
  template:
    metadata:
      labels:
        app: opsforge-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: opsforge-postgres-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: opsforge-postgres-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: opsforge-postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: opsforge-postgres-secret
                  key: POSTGRES_USER
      containers:
        - name: api
          image: opsforge-api:phase5
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opsforge-postgres-secret
                  key: DATABASE_URL
            - name: PYTHONPATH
              value: /app
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
