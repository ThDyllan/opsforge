apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-opsforge
  namespace: monitoring
data:
  opsforge-monitoring.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "opsforge-prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "DOWN"
                    },
                    "1": {
                      "color": "green",
                      "index": 1,
                      "text": "UP"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "opsforge-prometheus"
              },
              "expr": "up{job=\"opsforge-api\"}",
              "legendFormat": "API availability",
              "refId": "A"
            }
          ],
          "title": "API availability",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "opsforge-prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 18,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "opsforge-prometheus"
              },
              "expr": "sum(rate(opsforge_http_requests_total[1m]))",
              "legendFormat": "requests/sec",
              "refId": "A"
            }
          ],
          "title": "HTTP request volume",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "opsforge-prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "opsforge-prometheus"
              },
              "expr": "sum by (status_code) (opsforge_http_requests_total)",
              "legendFormat": "{{status_code}}",
              "refId": "A"
            }
          ],
          "title": "HTTP request count by status",
          "type": "bargauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "opsforge-prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "opsforge-prometheus"
              },
              "expr": "histogram_quantile(0.95, sum(rate(opsforge_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95 latency",
              "refId": "A"
            }
          ],
          "title": "HTTP latency p95",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "opsforge-prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "id": 5,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "opsforge-prometheus"
              },
              "expr": "sum by (route) (opsforge_http_requests_total)",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ],
          "title": "HTTP request count by route",
          "type": "bargauge"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "opsforge",
        "phase5"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "OpsForge Monitoring",
      "uid": "opsforge-monitoring",
      "version": 1,
      "weekStart": ""
    }
