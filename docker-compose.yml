services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opsforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsforge}
      POSTGRES_DB: ${POSTGRES_DB:-opsforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://opsforge:opsforge@db:5432/opsforge}
      PYTHONPATH: /app
    volumes:
      - ./tests:/app/tests:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
